<!DOCTYPE  html>
<html lang="ja">
    <head>
    <meta charset="UTF-8">
    <title>Modal Gallery</title>
    <style>
      /* Style the Image Used to Trigger the Modal */
#myImg {
  border-radius: 5px;
  cursor: pointer;
  transition: 0.3s;
}

#myImg:hover {opacity: 0.7;}

/* The Modal (background) */
.modal {
  display: none; /* Hidden by default */
  position: fixed; /* Stay in place */
  z-index: 1; /* Sit on top */
  padding-top: 100px; /* Location of the box */
  left: 0;
  top: 0;
  width: 100%; /* Full width */
  height: 100%; /* Full height */
  overflow: auto; /* Enable scroll if needed */
  background-color: rgb(0,0,0); /* Fallback color */
  background-color: rgba(0,0,0,0.9); /* Black w/ opacity */
}

/* Modal Content (Image) */
.modal-content {
  margin: 0 40px;
  display: block;
  width: 80%;
  max-width: 700px;
  /* height:100%; */
}

/* Caption of Modal Image (Image Text) - Same Width as the Image */
#caption {
  margin: 10px auto;
  display: block;
  width: 80%;
  max-width: 700px;
  text-align: center;
  color: #ccc;
  padding: 10px 0;
  height: 150px;
}

.navigate{
color:white;
background-color:gray;
border-radius:5px;
}

.navigate:hover{
  color:rgb(207, 207, 207)!important;
  background-color:rgb(59, 59, 59);
}

/* Add Animation - Zoom in the Modal */
.modal-content, #caption,.navigate {
  animation-name: zoom;
  animation-duration: 0.6s;
}

@keyframes zoom {
  from {transform:scale(0)}
  to {transform:scale(1)}
}

/* The Close Button */
.close {
  position: absolute;
  top: 15px;
  right: 35px;
  color: #f1f1f1;
  font-size: 40px;
  font-weight: bold;
  transition: 0.3s;
}

.close:hover,
.close:focus {
  color: #bbb;
  text-decoration: none;
  cursor: pointer;
}

/* 100% Image Width on Smaller Screens */
@media only screen and (max-width: 700px){
  .modal-content {
    width: 100%;
  }
}

.navigationAndContentContainer{
display:flex;
align-items: center;
justify-content: center;
height: 70%;

}

.thumbnails{
width:100%;
max-width:300px;

}

label{
    background:rgb(105, 105, 105);
    font-weight:800px;
    width:100%;
    height:100%;
    color:white;
    border-radius:10px;
    text-align:center;
}
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    border: 2px solid #ccc;
    margin-bottom: 30px;
    border-radius: 10px;
    background-color: #f9f9f9;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    
    border-radius:10px;


    width:100%;
max-width:300px;
height:200px;
max-height:200px;
}

.thumbnailContainer{
  display:grid;
  grid-template-columns: auto auto auto auto;
  gap: 10px;
}


    </style>
    </head>
